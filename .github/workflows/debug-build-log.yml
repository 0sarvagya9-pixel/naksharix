name: Debug Build Log

on:
  push:
    branches:
      - complete-production-polish
  workflow_dispatch:

jobs:
  build-log:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: naksharix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prisma generate
      - name: Build with log
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build-debug.log
          echo ${PIPESTATUS[0]} > build-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: |
            build-debug.log
            build-exit-code.txt
