<svg width="1400" height="1400" viewBox="0 0 1400 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(750 650) rotate(90) scale(760)">
      <stop offset="0" stop-color="#064A51"/>
      <stop offset="0.34" stop-color="#032545"/>
      <stop offset="1" stop-color="#02112C"/>
    </radialGradient>
    <radialGradient id="nebula" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(850 530) rotate(124) scale(520 710)">
      <stop offset="0" stop-color="#00B4A0" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#01A361" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#02112C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 705) scale(390)">
      <stop offset="0" stop-color="#FFD700" stop-opacity="0.42"/>
      <stop offset="0.44" stop-color="#D4AF37" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(628 552) rotate(118) scale(300 316)">
      <stop offset="0" stop-color="#FFF6BE"/>
      <stop offset="0.2" stop-color="#FFD700"/>
      <stop offset="0.48" stop-color="#D4AF37"/>
      <stop offset="0.74" stop-color="#8A6A16"/>
      <stop offset="1" stop-color="#3B2708"/>
