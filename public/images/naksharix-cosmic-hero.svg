    <radialGradient id="moon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(836 728) rotate(132) scale(310 345)">
      <stop offset="0" stop-color="#FFF4B7"/>
      <stop offset="0.24" stop-color="#D4AF37"/>
      <stop offset="0.68" stop-color="#6A4B10"/>
      <stop offset="1" stop-color="#1F1708"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="269" y1="200" x2="1129" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7E7A6"/>
      <stop offset="0.42" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8A6A16"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.68 0 0 1 0 0.12 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="metalShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="-18" dy="24" stdDeviation="28" flood-color="#000512" flood-opacity="0.68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="32" flood-color="#FFD700" flood-opacity="0.28"/>
    </filter>
    <filter id="lineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="moonCut">
      <circle cx="770" cy="684" r="294"/>
    </clipPath>
  </defs>

